<!DOCTYPE html>
<html>
<head>
  <title>TraceX</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      overflow-x:hidden;
    }

    .light {
    background:#f5f5f5;
    color:#111;
}

    
    #nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      background:#111827;
      flex-wrap:wrap;
    }
    .light #nav {
    background:#307abe;
    color:#111;
} 

    input, select, button {
      margin:5px;
      padding:6px;
    }

    
    #main { padding:15px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
    padding:15px;
    border-radius:10px;
    min-height:120px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    }

    .light .card {
    background:#ffffff;
    color:#111;
}

    .card h4 {
    font-size:16px;
    margin-bottom:8px;
    word-break:break-word;
  }

  .card p {
  font-size:13px;
  color:#ccc;
  word-break:break-word;
  }

  .light .card p {
  color:#444;
  }

   
    .pagination {
      text-align:center;
      margin-top:20px;
    }

   
    #footer {
      text-align:center;
      padding:10px;
      background:#111827;
    }
    .light #footer {
    background:#e5e7eb;
    color:#111;
}
    .favBtn {
   transition: 0.2s;
    }

  .favBtn.active {
  background: #ef4444;
  color: white;
  transform: scale(1.1);
  }

  .favBtn:hover {
  transform: scale(1.15);
  }
  
    #modal {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.7);
      padding:20px;
    }

    #modalBox {
      width:90%;
      max-width:600px;
      max-height:80vh;
      overflow-y:auto;
      background:#1e293b;
      padding:20px;
      border-radius:10px;
    }
    .light #modalBox {
    background:#ffffff;
    color:#111;
}

    #modalBox img {
      width:100%;
      height:auto;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div id="nav"></div>
<div id="main"></div>
<div id="footer">TraceX © 2026</div>

<div id="modal">
  <div id="modalBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
