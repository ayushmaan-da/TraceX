<!DOCTYPE html>
<html>
<head>
  <title>TraceX</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      overflow-x:hidden;
    }

    .light {
      background:#f5f5f5;
      color:black;
    }

    /* NAVBAR */
    #nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      background:#111827;
      flex-wrap:wrap;
    }

    input, select, button {
      margin:5px;
      padding:6px;
    }

    /* MAIN */
    #main { padding:15px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
      padding:10px;
      border-radius:10px;
      overflow:hidden;
    }

    .card img {
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:10px;
    }

    .card h4, .card p {
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* PAGINATION */
    .pagination {
      text-align:center;
      margin-top:20px;
    }

    /* FOOTER */
    #footer {
      text-align:center;
      padding:10px;
      background:#111827;
    }

    /* MODAL */
    #modal {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.7);
      padding:20px;
    }

    #modalBox {
      width:90%;
      max-width:600px;
      max-height:80vh;
      overflow-y:auto;
      background:#1e293b;
      padding:20px;
      border-radius:10px;
    }

    #modalBox img {
      width:100%;
      height:auto;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div id="nav"></div>
<div id="main"></div>
<div id="footer">TraceX © 2026</div>

<div id="modal">
  <div id="modalBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
